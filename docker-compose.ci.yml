version: '3.8'

services:
  db_ci:
    image: postgres:15
    container_name: pipeline_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskflow
    volumes:
      - pgdata_ci:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend_ci:
    image: python:3.9-slim
    container_name: pipeline_backend
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://admin:password@db_ci:5432/taskflow
    depends_on:
      - db_ci
    volumes:
      - ./backend:/app
    working_dir: /app
    command: bash -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend_ci:
    image: node:18-alpine
    container_name: pipeline_frontend
    ports:
      - "8081:3000"
    depends_on:
      - backend_ci
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  pgdata_ci:
